<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GatorGuide – Indoor Navigation Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f4f4f4; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
    .page-label { font-size: 13px; color: #888; margin-bottom: 0.5rem; }
    .phone { width: 320px; background: #111; border-radius: 36px; padding: 10px; box-shadow: 0 0 0 1px #333, 0 20px 60px rgba(0,0,0,0.3); }
    .screen { background: #fff; border-radius: 28px; overflow: hidden; }
    .statusbar { background: #1a1a2e; color: #fff; font-size: 11px; display: flex; justify-content: space-between; padding: 10px 18px 6px; }
    .topbar { background: #1a1a2e; padding: 10px 16px 14px; color: #fff; }
    .topbar-title { font-size: 18px; font-weight: 500; display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .gator-dot { width: 10px; height: 10px; border-radius: 50%; background: #FA4616; display: inline-block; }
    .search-row { display: flex; gap: 8px; }
    .search-box { flex: 1; background: rgba(255,255,255,0.12); border: none; border-radius: 10px; padding: 8px 12px; color: #fff; font-size: 13px; }
    .search-box::placeholder { color: rgba(255,255,255,0.5); }
    .go-btn { background: #FA4616; border: none; border-radius: 10px; padding: 8px 14px; color: #fff; font-size: 13px; font-weight: 500; cursor: pointer; }
    .map-area { position: relative; height: 310px; overflow: hidden; background: #dce8dc; }
    .map-area img.custom-map { width: 100%; height: 100%; object-fit: cover; display: block; }
    .map-area svg.default-map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    .floor-label { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.65); color: #fff; font-size: 11px; padding: 4px 10px; border-radius: 20px; z-index: 2; }
    .route-badge { position: absolute; top: 10px; right: 10px; background: #FA4616; color: #fff; font-size: 11px; padding: 4px 10px; border-radius: 20px; font-weight: 500; z-index: 2; }
    .infobar { background: #fff; padding: 12px 16px; border-bottom: 0.5px solid #e5e5e5; }
    .step-row { display: flex; align-items: center; gap: 10px; }
    .step-icon { width: 32px; height: 32px; border-radius: 50%; background: #FA4616; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .step-text { flex: 1; }
    .step-main { font-size: 13px; font-weight: 500; color: #111; }
    .step-sub { font-size: 11px; color: #888; margin-top: 1px; }
    .step-dist { font-size: 13px; color: #FA4616; font-weight: 500; }
    .progress-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
    .progress-bar { flex: 1; height: 4px; background: #eee; border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; width: 40%; background: #FA4616; border-radius: 2px; }
    .progress-text { font-size: 11px; color: #888; }
    .bottomnav { background: #fff; display: flex; border-top: 0.5px solid #e5e5e5; }
    .nav-btn { flex: 1; padding: 10px 0 12px; display: flex; flex-direction: column; align-items: center; gap: 3px; border: none; background: none; cursor: pointer; }
    .nav-icon { font-size: 16px; }
    .nav-lbl { font-size: 9px; color: #888; }
    .nav-lbl.active { color: #FA4616; }
    .page-footer { font-size: 11px; color: #aaa; margin-top: 0.75rem; }
  </style>
</head>
<body>

<div class="page-label">GatorGuide — Indoor Navigation Demo</div>

<div class="phone">
  <div class="screen">

    <div class="statusbar">
      <span>9:41</span>
      <span>●●● WiFi ▮▮▮</span>
    </div>

    <div class="topbar">
      <div class="topbar-title">
        <span class="gator-dot"></span>
        GatorGuide
      </div>
      <div class="search-row">
        <input class="search-box" value="NPB 2360" readonly />
        <button class="go-btn">Go</button>
      </div>
    </div>

    <!-- ============================================================
         MAP AREA
         To use your own image, set CUSTOM_MAP_URL below to your
         image link (any direct URL to a .png / .jpg / etc.).
         Leave it as an empty string "" to use the default SVG map.
    ================================================================ -->
    <div class="map-area" id="mapArea">

      <!-- Overlay badges always shown on top -->
      <div class="floor-label">2nd Floor · NPB</div>
      <div class="route-badge">On Route</div>

    </div>
    <!-- ============================================================ -->

    <div class="infobar">
      <div class="step-row">
        <div class="step-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <path d="M9 18l6-6-6-6" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="step-text">
          <div class="step-main">Turn right at the elevator</div>
          <div class="step-sub">Head north down hallway 2B</div>
        </div>
        <div class="step-dist">~40 ft</div>
      </div>
      <div class="progress-row">
        <div class="progress-bar"><div class="progress-fill"></div></div>
        <div class="progress-text">2 min · 120 ft remaining</div>
      </div>
    </div>

    <div class="bottomnav">
      <button class="nav-btn">
        <span class="nav-icon">🗺</span>
        <span class="nav-lbl active">Map</span>
      </button>
      <button class="nav-btn">
        <span class="nav-icon">🔍</span>
        <span class="nav-lbl">Search</span>
      </button>
      <button class="nav-btn">
        <span class="nav-icon">♿</span>
        <span class="nav-lbl">Access</span>
      </button>
      <button class="nav-btn">
        <span class="nav-icon">☰</span>
        <span class="nav-lbl">More</span>
      </button>
    </div>

  </div>
</div>

<div class="page-footer">University of Florida · Physics Building (NPB)</div>

<script>
  // ================================================================
  //  SET YOUR CUSTOM MAP IMAGE URL HERE
  //  Example: const CUSTOM_MAP_URL = "https://example.com/map.png";
  //  Leave as "" to show the default SVG floor plan.
  // ================================================================
  const CUSTOM_MAP_URL = "Gemini_Generated_Image_AR.png";
  // ================================================================

  const mapArea = document.getElementById("mapArea");

  if (CUSTOM_MAP_URL) {
    const img = document.createElement("img");
    img.src = CUSTOM_MAP_URL;
    img.className = "custom-map";
    img.alt = "Floor map";
    mapArea.insertBefore(img, mapArea.firstChild);
  } else {
    const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    svg.setAttribute("viewBox", "0 0 300 310");
    svg.setAttribute("xmlns", "http://www.w3.org/2000/svg");
    svg.classList.add("default-map");
    svg.innerHTML = `
      <rect width="300" height="310" fill="#dce8dc"/>
      <rect x="30" y="20" width="240" height="270" rx="4" fill="#c8d8c8" stroke="#aac0aa" stroke-width="0.5"/>
      <rect x="50" y="40" width="80" height="50" rx="2" fill="#b8ccb8" stroke="#9ab09a" stroke-width="0.5"/>
      <rect x="160" y="40" width="80" height="50" rx="2" fill="#b8ccb8" stroke="#9ab09a" stroke-width="0.5"/>
      <rect x="50" y="110" width="80" height="50" rx="2" fill="#b8ccb8" stroke="#9ab09a" stroke-width="0.5"/>
      <rect x="160" y="110" width="80" height="50" rx="2" fill="#c8dce8" stroke="#9ab0c0" stroke-width="0.5"/>
      <rect x="50" y="180" width="80" height="50" rx="2" fill="#b8ccb8" stroke="#9ab09a" stroke-width="0.5"/>
      <rect x="160" y="180" width="80" height="50" rx="2" fill="#b8ccb8" stroke="#9ab09a" stroke-width="0.5"/>
      <rect x="50" y="250" width="80" height="30" rx="2" fill="#b8ccb8" stroke="#9ab09a" stroke-width="0.5"/>
      <rect x="160" y="250" width="80" height="30" rx="2" fill="#b8ccb8" stroke="#9ab09a" stroke-width="0.5"/>
      <line x1="140" y1="40" x2="140" y2="280" stroke="#9ab09a" stroke-width="0.5" stroke-dasharray="3,3"/>
      <line x1="30" y1="100" x2="270" y2="100" stroke="#9ab09a" stroke-width="0.5" stroke-dasharray="3,3"/>
      <line x1="30" y1="170" x2="270" y2="170" stroke="#9ab09a" stroke-width="0.5" stroke-dasharray="3,3"/>
      <line x1="30" y1="240" x2="270" y2="240" stroke="#9ab09a" stroke-width="0.5" stroke-dasharray="3,3"/>
      <polyline points="75,270 75,155 200,155 200,65" fill="none" stroke="#FA4616" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="6,3" opacity="0.9"/>
      <circle cx="75" cy="270" r="7" fill="#FA4616" stroke="white" stroke-width="2"/>
      <text x="85" y="274" font-size="9" fill="#FA4616" font-weight="500" font-family="sans-serif">You</text>
      <rect x="177" y="40" width="46" height="20" rx="3" fill="#0021A5"/>
      <text x="200" y="53" font-size="8" fill="white" text-anchor="middle" font-weight="500" font-family="sans-serif">NPB 2360</text>
      <circle cx="200" cy="65" r="5" fill="#0021A5" stroke="white" stroke-width="2"/>
      <text x="90" y="60" font-size="7" fill="#7a8f7a" text-anchor="middle" font-family="sans-serif">2342</text>
      <text x="200" y="60" font-size="7" fill="#7a8f7a" text-anchor="middle" font-family="sans-serif">2360</text>
      <text x="90" y="130" font-size="7" fill="#7a8f7a" text-anchor="middle" font-family="sans-serif">2244</text>
      <text x="200" y="130" font-size="7" fill="#7a8f7a" text-anchor="middle" font-family="sans-serif">Elevator</text>
      <text x="90" y="200" font-size="7" fill="#7a8f7a" text-anchor="middle" font-family="sans-serif">2156</text>
      <text x="200" y="200" font-size="7" fill="#7a8f7a" text-anchor="middle" font-family="sans-serif">2162</text>
      <text x="90" y="265" font-size="7" fill="#7a8f7a" text-anchor="middle" font-family="sans-serif">Entrance</text>
      <text x="200" y="265" font-size="7" fill="#7a8f7a" text-anchor="middle" font-family="sans-serif">2194</text>
    `;
    mapArea.insertBefore(svg, mapArea.firstChild);
  }
</script>

</body>
</html>
